    // ---------- helpers ----------
    function slugify(str) {
      return str.toLowerCase()
        .trim()
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    function formatDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

      document.querySelectorAll('.sidebar .nav-item').forEach(i => i.classList.remove('active'));

      }
    }

    async function uploadPostImage(file) {
      const bucket = 'blog-images';
      const safeName = file.name.replace(/[^a-zA-Z0-9.-]/g, '-');
      // Store under a "posts/" folder for organization
      const path = `posts/${Date.now()}-${safeName}`;

      const { data, error } = await supabaseClient.storage
        .from(bucket)
        .upload(path, file, { upsert: true });

      if (error) {
        alert(
          'Image upload failed: ' + error.message + 
          '\n\nPlease create a bucket named "blog-images" in Supabase Storage ' +
          'and set the security policies (see instructions in chat or README).'
        );
        return null;
      }

      const { data: pub } = supabaseClient.storage.from(bucket).getPublicUrl(path);
      return pub.publicUrl;
    }

    function insertAtCursor(textarea, text) {
      const start = textarea.selectionStart || 0;
      const end = textarea.selectionEnd || 0;
      const before = textarea.value.substring(0, start);
      const after = textarea.value.substring(end);
      textarea.value = before + text + after;
      const newPos = start + text.length;
      textarea.selectionStart = textarea.selectionEnd = newPos;
      textarea.focus();
      textarea.dispatchEvent(new Event('input')); // refresh preview
    }

    // Re-render tasks list when filters or data change (already handled in render)

    function applyTaskFilterAndRender() {

      if (container && tasksCache) {

    function renderPostsList(posts) {
      const list = document.getElementById('posts-list');
      if (!list) return;

      // Calculate stats
      const total = posts.length;
      const published = posts.filter(p => p.published).length;
      const drafts = total - published;

      // Update stat cards
      const totalEl = document.getElementById('stat-total');
      const pubEl = document.getElementById('stat-published');
      const draftsEl = document.getElementById('stat-drafts');
      if (totalEl) totalEl.textContent = total;
      if (pubEl) pubEl.textContent = published;
      if (draftsEl) draftsEl.textContent = drafts;

      // Apply filter
      let filtered = posts;
      if (currentPostFilter === 'published') filtered = posts.filter(p => p.published);
      if (currentPostFilter === 'drafts') filtered = posts.filter(p => !p.published);

      const countEl = document.getElementById('posts-count');
      if (countEl) countEl.textContent = `${filtered.length} shown`;

      if (!filtered.length) {
        list.innerHTML = `<li class="empty">No posts in this filter. Click a stat card or “+ New Post”.</li>`;
        return;
      }

      list.innerHTML = filtered.map(p => {
        const pub = p.published
          ? `<span style="color:#6f6b63;font-size:12px;">published</span>`
          : `<span style="color:#9a201f;font-size:12px;">draft</span>`;
        const viewLink = p.published
          ? `<a class="btn small" href="blog.html?slug=${encodeURIComponent(p.slug)}" target="_blank" rel="noopener">View</a>`
          : '';
        return `
          <li data-id="${p.id}">
            <span class="title">${escapeHtml(p.title)}</span>
            <span class="meta">${escapeHtml(p.slug)} ${pub}</span>
            <span class="actions">
              ${viewLink}
              <button class="btn small" data-action="edit">Edit</button>
              <button class="btn small" data-action="toggle">${p.published ? 'Unpublish' : 'Publish'}</button>
              <button class="btn small danger" data-action="delete">Delete</button>
            </span>
          </li>
        `;
      }).join('');

      list.querySelectorAll('button').forEach(btn => {
        const li = btn.closest('li');
        const id = li.dataset.id;
        const action = btn.dataset.action;

        btn.addEventListener('click', async () => {
          const post = postsCache.find(x => x.id === id);
          if (!post) return;

          if (action === 'edit') {
            editPost(post);
          } else if (action === 'toggle') {
            await togglePublish(post);
          } else if (action === 'delete') {
            if (confirm(`Delete “${post.title}”?`)) await deletePost(id);
          }
        });
      });
    }

    function renderTasksList(tasks) {
      const container = document.getElementById('tasks-list');
      if (!container) return;

      // Apply filter
      let filtered = tasks;
      if (currentTaskFilter !== 'all') {
        filtered = tasks.filter(t => t.status === currentTaskFilter);
      }

      if (!filtered.length) {
        container.innerHTML = `<div class="empty">No tasks in this view.</div>`;
        return;
      }

      container.innerHTML = filtered.map(t => {
        const due = t.due_date ? `due ${t.due_date}` : '';
        const proj = t.project ? escapeHtml(t.project) : '';
        const prio = t.priority != null ? (t.priority > 0 ? 'high' : t.priority < 0 ? 'low' : '') : '';

        return `
          <details class="entry entry--collapsible admin-task" data-id="${t.id}">
            <summary class="entry__head">
              <span class="entry__title">
                <span class="status-pill ${t.status}">${t.status}</span>
                <span>${escapeHtml(t.title)}</span>
              </span>
              <span class="entry__date">${[prio, proj, due].filter(Boolean).join(' · ')}</span>
            </summary>
            <div class="entry__panel">
              <div class="entry__panel-inner">
                <form class="admin-task-form" data-task-id="${t.id}">
                  <div>
                    <label>Title</label>
                    <input class="input" name="title" value="${escapeHtml(t.title || '')}">
                  </div>

                  <div class="row">
                    <div style="flex:1">
                      <label>Status</label>
                      <select class="input" name="status">
                        <option value="todo" ${t.status==='todo'?'selected':''}>Todo</option>
                        <option value="doing" ${t.status==='doing'?'selected':''}>Doing</option>
                        <option value="done" ${t.status==='done'?'selected':''}>Done</option>
                      </select>
                    </div>
                    <div style="flex:1">
                      <label>Priority</label>
                      <select class="input" name="priority">
                        <option value="1" ${t.priority==1?'selected':''}>High</option>
                        <option value="0" ${t.priority==0 || t.priority==null ?'selected':''}>Normal</option>
                        <option value="-1" ${t.priority==-1?'selected':''}>Low</option>
                      </select>
                    </div>
                    <div style="flex:1">
                      <label>Due date</label>
                      <input class="input" type="date" name="due_date" value="${t.due_date || ''}">
                    </div>
                  </div>

                  <div>
                    <label>Project / Area</label>
                    <input class="input" name="project" value="${escapeHtml(t.project || '')}" placeholder="e.g. personal-site, research">
                  </div>

                  <div>
                    <label>Description (Markdown supported)</label>
                    <textarea class="textarea" name="description" style="min-height:90px;" placeholder="Notes, links, steps…">${escapeHtml(t.description || '')}</textarea>
                  </div>

                  <div class="actions">
                    <button type="button" class="btn primary save-task-btn">Save changes</button>
                    <button type="button" class="btn danger delete-task-btn">Delete</button>
                    <span class="muted" style="margin-left:auto; font-size:11px; align-self:center;">Click title to collapse</span>
                  </div>
                </form>
              </div>
            </div>
          </details>
        `;
      }).join('');

      // Wire the forms inside each task
      container.querySelectorAll('.admin-task-form').forEach(form => {
        const id = form.dataset.taskId;
        const task = tasksCache.find(x => x.id === id);
        if (!task) return;

        // Save handler
        form.querySelector('.save-task-btn').addEventListener('click', async () => {
          const fd = new FormData(form);
          const changes = {
            title: (fd.get('title') || '').trim(),
            status: fd.get('status'),
            priority: parseInt(fd.get('priority'), 10),
            due_date: fd.get('due_date') || null,
            project: (fd.get('project') || '').trim() || null,
            description: (fd.get('description') || '').trim() || null,
          };
          if (!changes.title) {
            alert('Title is required.');
            return;
          }
          await updateTask(id, changes);
        });

        // Delete handler
        form.querySelector('.delete-task-btn').addEventListener('click', async () => {
          if (confirm('Delete this task?')) {
            await deleteTask(id);
          }
        });
      });

      // Optional: clicking the status pill in the summary cycles it (nice quick action)
      container.querySelectorAll('.admin-task .status-pill').forEach(pill => {
        const details = pill.closest('.admin-task');
        const id = details.dataset.id;
        pill.style.cursor = 'pointer';
        pill.addEventListener('click', async (e) => {
          e.preventDefault();
          const task = tasksCache.find(x => x.id === id);
          if (!task) return;
          const order = ['todo', 'doing', 'done'];
          const next = order[(order.indexOf(task.status) + 1) % 3];
          await updateTask(id, { status: next });
        });
      });
    }

    // ---------- data operations ----------
    async function refreshPosts() {
      const { data, error } = await supabaseClient
        .from('posts')
        .select('*')
        .order('updated_at', { ascending: false });

      if (error) {
        console.error(error);
        return;
      }
      postsCache = data || [];
      renderPostsList(postsCache);
    }

    async function refreshTasks() {
      const { data, error } = await supabaseClient
        .from('tasks')
        .select('*')
        .order('updated_at', { ascending: false });

      if (error) {
        console.error(error);
        return;
      }
      tasksCache = data || [];
      renderTasksList(tasksCache);
    }

    function startNewPost() {
      editingPostId = null;
      const editor = document.getElementById('post-editor');
      editor.style.display = 'block';

      document.getElementById('post-title').value = '';
      document.getElementById('post-slug').value = '';
      document.getElementById('post-tags').value = '';
      document.getElementById('post-content').value = '';
      document.getElementById('post-published').checked = false;
      document.getElementById('post-published-at').textContent = '';
      document.getElementById('post-preview').innerHTML = '';
      document.getElementById('post-title').focus();
    }

    function editPost(post) {
      editingPostId = post.id;
      const editor = document.getElementById('post-editor');
      editor.style.display = 'block';

      document.getElementById('post-title').value = post.title || '';
      document.getElementById('post-slug').value = post.slug || '';
      document.getElementById('post-tags').value = (post.tags || []).join(', ');
      document.getElementById('post-content').value = post.content || '';
      document.getElementById('post-published').checked = !!post.published;
      document.getElementById('post-published-at').textContent =
        post.published_at ? `published ${formatDate(post.published_at)}` : '';

      const preview = document.getElementById('post-preview');
      preview.innerHTML = window.marked ? window.marked.parse(post.content || '') : escapeHtml(post.content || '');

      document.getElementById('post-title').focus();
      window.scrollTo({ top: editor.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });
    }

    function cancelPostEdit() {
      editingPostId = null;
      document.getElementById('post-editor').style.display = 'none';
    }

    async function savePost() {
      const title = document.getElementById('post-title').value.trim();
      const slug = document.getElementById('post-slug').value.trim() || slugify(title);
      const tagsRaw = document.getElementById('post-tags').value.trim();
      const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
      const content = document.getElementById('post-content').value;
      const published = document.getElementById('post-published').checked;

      if (!title || !slug || !content) {
        alert('Title, slug, and content are required.');
        return;
      }

      const payload = {
        title,
        slug,
        content,
        tags,
        published,
        published_at: published ? (new Date()).toISOString() : null
      };

      let error;
      if (editingPostId) {
        ({ error } = await supabaseClient.from('posts').update(payload).eq('id', editingPostId));
      } else {
        ({ error } = await supabaseClient.from('posts').insert(payload));
      }

      if (error) {
        alert('Save failed: ' + error.message);
        return;
      }

      document.getElementById('post-editor').style.display = 'none';
      editingPostId = null;
      await refreshPosts();
    }

    async function deleteCurrentPost() {
      if (!editingPostId) return;
      if (!confirm('Permanently delete this post?')) return;

      const { error } = await supabaseClient.from('posts').delete().eq('id', editingPostId);
      if (error) {
        alert('Delete failed: ' + error.message);
        return;
      }
      document.getElementById('post-editor').style.display = 'none';
      editingPostId = null;
      await refreshPosts();
    }

    async function togglePublish(post) {
      const newPublished = !post.published;
      const payload = {
        published: newPublished,
        published_at: newPublished && !post.published_at ? new Date().toISOString() : post.published_at
      };

      const { error } = await supabaseClient.from('posts').update(payload).eq('id', post.id);
      if (error) {
        alert('Failed to toggle: ' + error.message);
        return;
      }
      await refreshPosts();
    }

    async function deletePost(id) {
      const { error } = await supabaseClient.from('posts').delete().eq('id', id);
      if (error) {
        alert('Delete failed: ' + error.message);
        return;
      }
      await refreshPosts();
    }

    async function addTaskQuick() {
      const titleEl = document.getElementById('task-title');
      const title = titleEl.value.trim();
      if (!title) return;

      const { error } = await supabaseClient.from('tasks').insert({
        title,
        status: 'todo'
      });
      if (error) {
        alert('Failed to add task: ' + error.message);
        return;
      }
      titleEl.value = '';
      await refreshTasks();
    }

    async function updateTask(id, changes) {
      const { error } = await supabaseClient.from('tasks').update(changes).eq('id', id);
      if (error) {
        alert('Update failed: ' + error.message);
        return;
      }
      await refreshTasks();
    }

    async function deleteTask(id) {
      const { error } = await supabaseClient.from('tasks').delete().eq('id', id);
      if (error) {
        alert('Delete failed: ' + error.message);
        return;
      }
      await refreshTasks();
    }

    // ---------- auth bootstrap ----------
    async function init() {
      if (window.marked && window.marked.setOptions) {
        window.marked.setOptions({ breaks: true, gfm: true });
      }

      // Listen for auth changes (sign in / sign out from any tab, etc.)
      supabaseClient.auth.onAuthStateChange(async (event, session) => {
        if (session?.user) {
          currentUser = session.user;
          renderDashboard();
        } else {
          currentUser = null;
          renderLogin();
        }
      });

      // Initial session check
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session?.user) {
        currentUser = session.user;
        renderDashboard();
      } else {
        renderLogin();
      }
    }

    init();
  </script>
</body>
</html>
